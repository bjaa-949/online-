<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroArena.io - Firebase Realtime P2P</title>
    <!-- PeerJS para conexiones directas WebRTC entre jugadores -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <!-- Mapa de importaciones para módulos oficiales de Firebase v10 -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
      }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #03030c; font-family: 'Courier New', Courier, monospace; color: #fff; }
        
        #gameCanvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #lobbyUI {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(8, 8, 24, 0.95); padding: 30px; border-radius: 16px;
            border: 2px solid #5758bb; box-shadow: 0 0 30px rgba(87, 88, 187, 0.4);
            text-align: center; width: 450px; z-index: 10; backdrop-filter: blur(12px);
        }
        h1 { font-size: 28px; margin-bottom: 15px; color: #00d2d3; text-shadow: 0 0 15px rgba(0, 210, 211, 0.6); }
        
        .tabs { display: flex; margin-bottom: 15px; border-bottom: 1px solid #5758bb; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #888; text-transform: uppercase; font-size: 12px; font-weight: bold; }
        .tab.active { color: #00d2d3; border-bottom: 2px solid #00d2d3; background: rgba(87, 88, 187, 0.1); }
        .tab-content { display: none; text-align: left; }
        .tab-content.active { display: block; }

        label { display: block; margin-bottom: 5px; font-size: 11px; color: #aaa; text-transform: uppercase; }
        input[type="text"] {
            width: 100%; padding: 10px; background: #0c0c24; border: 1px solid #5758bb;
            color: #00d2d3; border-radius: 6px; margin-bottom: 12px; font-size: 14px;
            font-family: inherit; outline: none;
        }
        
        .room-type-container, .control-type-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 10px; background: #0c0c24; border: 1px solid #5758bb; color: #fff; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; text-align: center; }
        .type-btn.selected { border-color: #ff3f34; background: rgba(255, 63, 52, 0.1); color: #ff3f34; font-weight: bold; }
        .control-btn { flex: 1; padding: 10px; background: #0c0c24; border: 1px solid #5758bb; color: #fff; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; text-align: center; }
        .control-btn.selected { border-color: #00d2d3; background: rgba(0, 210, 211, 0.1); color: #00d2d3; font-weight: bold; }

        .color-picker { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 5px; }
        .color-opt { width: 35px; height: 35px; border-radius: 6px; cursor: pointer; border: 2px solid rgba(0,0,0,0.4); flex: 1; }
        .color-opt.selected { border-color: #fff; box-shadow: 0 0 10px currentColor; }
        
        .btn {
            width: 100%; padding: 12px; border: none; color: white; font-weight: bold; font-size: 14px;
            border-radius: 6px; cursor: pointer; text-transform: uppercase; font-family: inherit; transition: 0.2s;
        }
        .btn-host { background: linear-gradient(135deg, #ff3f34, #ff5e57); }
        .btn-join { background: linear-gradient(135deg, #05c46b, #0be881); }
        
        .server-list { background: #0c0c24; border: 1px solid #5758bb; border-radius: 6px; height: 140px; overflow-y: auto; margin-bottom: 10px; padding: 5px; }
        .server-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid rgba(87, 88, 187, 0.2); font-size: 12px; }
        .server-item:last-child { border-bottom: none; }
        .join-item-btn { background: #05c46b; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; }
        .no-servers { text-align: center; color: #666; font-size: 12px; margin-top: 50px; }

        #hud { position: absolute; top: 25px; left: 25px; z-index: 5; font-size: 22px; font-weight: bold; color: #0be881; display: none; }
        #skillhud { position: absolute; top: 60px; left: 25px; z-index: 5; font-size: 14px; font-weight: bold; color: #ffdd59; display: none; background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 5px; }
        #leaderboard { position: absolute; top: 25px; right: 80px; background: rgba(6, 6, 18, 0.85); padding: 15px; border-radius: 10px; min-width: 200px; display: none; border: 1px solid #5758bb; z-index: 5; }
        .lb-title { color: #ffdd59; font-size: 12px; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,221,89,0.3); padding-bottom: 5px; }
        .lb-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
        .room-panel { position: absolute; bottom: 25px; left: 25px; background: rgba(6, 6, 18, 0.85); padding: 12px; border-radius: 8px; border: 1px solid #5758bb; display: none; font-size: 12px; z-index: 5; }
        .copy-badge { background: #5758bb; padding: 2px 5px; border-radius: 4px; font-size: 10px; cursor: pointer; margin-left: 5px; }

        /* Botón de Pantalla Completa */
        #fullscreenBtn {
            position: absolute; top: 25px; right: 25px; width: 40px; height: 40px;
            background: rgba(6, 6, 18, 0.85); border: 1px solid #5758bb; border-radius: 8px;
            z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(87, 88, 187, 0.3); transition: 0.2s;
        }
        #fullscreenBtn:active { transform: scale(0.9); }
        #fullscreenBtn svg { width: 20px; height: 20px; fill: #00d2d3; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- Botón de Pantalla Completa (Esquina Superior Derecha) -->
    <div id="fullscreenBtn" title="Pantalla Completa">
        <svg viewBox="0 0 24 24">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
    </div>

    <div id="lobbyUI">
        <h1>ASTROARENA.IO</h1>
        
        <div class="tabs">
            <div id="tabBtnHost" class="tab active">Crear Servidor</div>
            <div id="tabBtnJoin" class="tab">Buscar Servidores</div>
        </div>

        <label>Nombre del Piloto</label>
        <input type="text" id="username" value="StarFighter" maxlength="12">
        
        <label>Dispositivo de Control</label>
        <div class="control-type-container">
            <div id="controlPC" class="control-btn selected">💻 TECLADO + MOUSE</div>
            <div id="controlMobile" class="control-btn">📱 MÓVIL (JOYSTICK)</div>
        </div>

        <label>Color de la Nave</label>
        <div class="color-picker">
            <div class="color-opt selected" style="background: #00d2d3;" data-color="#00d2d3"></div>
            <div class="color-opt" style="background: #0be881;" data-color="#0be881"></div>
            <div class="color-opt" style="background: #ff3f34;" data-color="#ff3f34"></div>
            <div class="color-opt" style="background: #ffdd59;" data-color="#ffdd59"></div>
            <div class="color-opt" style="background: #ef57b2;" data-color="#ef57b2"></div>
        </div>

        <!-- SECCIÓN CREAR -->
        <div id="hostTab" class="tab-content active">
            <label>Visibilidad del Servidor</label>
            <div class="room-type-container">
                <div id="typePublic" class="type-btn selected">PÚBLICO (Lista Global)</div>
                <div id="typePrivate" class="type-btn">PRIVADO (Código)</div>
            </div>
            <button id="btnHost" class="btn btn-host">Lanzar Servidor</button>
        </div>

        <!-- SECCIÓN UNIRSE -->
        <div id="joinTab" class="tab-content">
            <label>Servidores Públicos Activos</label>
            <div class="server-list" id="serverListContainer">
                <div class="no-servers">Buscando señales espaciales...</div>
            </div>
            
            <label style="margin-top: 10px;">O ingresa código privado</label>
            <input type="text" id="joinId" placeholder="Pegar ID de sala...">
            <button id="btnJoin" class="btn btn-join">Conectarse por Código</button>
        </div>
        
        <div id="statusMsg" style="margin-top:15px; font-size:11px; color:#666; text-transform: uppercase; text-align: center;">En Hangar...</div>
    </div>

    <div id="hud">SCORE: <span id="scoreVal">0</span></div>
    <div id="skillhud">HABILIDAD: <span id="skillVal">NINGUNA</span> (<span id="skillTime">0</span>s)</div>
    <div id="leaderboard"><div class="lb-title">📡 RADAR DE PUNTUACIONES</div><div id="lbContent"></div></div>
    <div id="roomPanel" class="room-panel"><span id="roomString">SALA: -</span><span class="copy-badge" id="btnCopy">COPIAR ID</span></div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, onDisconnect } from "firebase/database";

        // CONFIGURACIÓN DE TU CONFIG DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCR9L0Ll756X5YRrzXAcZb3TsKkcWLyLz0",
            authDomain: "online-ee004.firebaseapp.com",
            databaseURL: "https://online-ee004-default-rtdb.firebaseio.com",
            projectId: "online-ee004",
            storageBucket: "online-ee004.firebasestorage.app",
            messagingSenderId: "339846178911",
            appId: "1:339846178911:web:f3abbee7289d3dc73493ea",
            measurementId: "G-EM3459YE9B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const WORLD_SIZE = 3000;

        let starsBackground = [];
        let isPublicRoom = true;
        let controlMode = "pc"; 
        let activeColor = '#00d2d3';
        let firebaseRoomRef = null;

        // Parámetros del Joystick Virtual
        const joystick = {
            active: false,
            pointerId: null,
            startX: 0, startY: 0,
            currentX: 0, currentY: 0,
            maxRadius: 60,
            moveX: 0, moveY: 0  
        };

        // Parámetros de la cámara y el Zoom dinámico
        const camera = {
            zoom: 1.0,
            minZoom: 0.5,
            maxZoom: 1.8,
            targetZoom: 1.0,
            initialPinchDist: 0,
            isPinching: false
        };

        function generateStars() {
            starsBackground = [];
            for (let i = 0; i < 150; i++) {
                starsBackground.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, depth: Math.random() * 0.6 + 0.1, size: Math.random() * 2 });
            }
        }

        // ==========================================
        // SISTEMA DE PARTÍCULAS (FX)
        // ==========================================
        class ParticleSystem {
            constructor() { this.pool = []; }
            spawn(x, y, color, size, count = 1) {
                for(let i=0; i<count; i++) {
                    let a = Math.random() * Math.PI * 2;
                    let s = Math.random() * 3 + 1;
                    this.pool.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, radius: Math.random()*size+1, alpha: 1, decay: Math.random()*0.02+0.02, color });
                }
            }
            update(dt) {
                for(let i = this.pool.length - 1; i >= 0; i--) {
                    let p = this.pool[i]; p.x += p.vx*(dt*60); p.y += p.vy*(dt*60); p.alpha -= p.decay*(dt*60);
                    if(p.alpha <= 0) this.pool.splice(i, 1);
                }
            }
            draw(ctx, cx, cy) {
                ctx.save();
                for(let p of this.pool) {
                    ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x - cx, p.y - cy, p.radius, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            }
        }
        const FX = new ParticleSystem();

        // ==========================================
        // CONTROLADORES DE ENTIDAD
        // ==========================================
        class Player {
            constructor(id, name, x, y, color, isLocal = false) {
                this.id = id; this.name = name; this.x = x; this.y = y;
                this.vx = 0; this.vy = 0; this.angle = 0; this.color = color;
                this.radius = 16; this.score = 0; this.isLocal = isLocal;
                this.buffer = [];
                this.activeSkill = "NINGUNA";
                this.skillTimeLeft = 0;
            }
            update(dt, keys, targetAngle) {
                if (this.isLocal) {
                    if (this.skillTimeLeft > 0) {
                        this.skillTimeLeft -= dt;
                        if (this.skillTimeLeft <= 0) {
                            this.activeSkill = "NINGUNA";
                            this.skillTimeLeft = 0;
                        }
                    }

                    let currentSpeedForce = 0.35;
                    if (this.activeSkill === "SUPER_VELOCIDAD") {
                        currentSpeedForce = 0.65; 
                    }

                    if (controlMode === "pc") {
                        this.angle = targetAngle;
                        if (keys['w'] || keys['ArrowUp'] || keys['s'] || keys['ArrowDown']) {
                            let force = (keys['w'] || keys['ArrowUp']) ? currentSpeedForce : -0.15;
                            this.vx += Math.cos(this.angle) * force;
                            this.vy += Math.sin(this.angle) * force;
                            if(Math.random() < 0.4) FX.spawn(this.x - Math.cos(this.angle)*12, this.y - Math.sin(this.angle)*12, '#ff9f43', 1.5, 1);
                        }
                    } else {
                        if (joystick.active) {
                            this.angle = Math.atan2(joystick.moveY, joystick.moveX);
                            let joystickDist = Math.sqrt(joystick.moveX*joystick.moveX + joystick.moveY*joystick.moveY);
                            if (joystickDist > 0.1) {
                                this.vx += Math.cos(this.angle) * currentSpeedForce * joystickDist;
                                this.vy += Math.sin(this.angle) * currentSpeedForce * joystickDist;
                                if(Math.random() < 0.4) FX.spawn(this.x - Math.cos(this.angle)*12, this.y - Math.sin(this.angle)*12, '#ff9f43', 1.5, 1);
                            }
                        }
                    }
                    
                    this.vx *= 0.95; this.vy *= 0.95;
                    this.x += this.vx * (dt * 60); this.y += this.vy * (dt * 60);
                    if (this.x < 0) this.x += WORLD_SIZE; if (this.x > WORLD_SIZE) this.x -= WORLD_SIZE;
                    if (this.y < 0) this.y += WORLD_SIZE; if (this.y > WORLD_SIZE) this.y -= WORLD_SIZE;
                } else if (this.buffer.length >= 2) {
                    let rTime = Date.now() - 70;
                    let i = 0;
                    for (; i < this.buffer.length - 1; i++) {
                        if (this.buffer[i].t <= rTime && this.buffer[i+1].t >= rTime) break;
                    }
                    if (i < this.buffer.length - 1) {
                        let p1 = this.buffer[i], p2 = this.buffer[i+1];
                        let alpha = (rTime - p1.t) / (p2.t - p1.t);
                        this.x = p1.x + (p2.x - p1.x) * alpha;
                        this.y = p1.y + (p2.y - p1.y) * alpha;
                        this.angle = p1.angle + (p2.angle - p1.angle) * alpha;
                    }
                    if(this.buffer.length > 15) this.buffer.shift();
                }
            }
            draw(ctx, cx, cy) {
                let sx = this.x - cx, sy = this.y - cy;
                ctx.save(); ctx.translate(sx, sy); ctx.rotate(this.angle);
                ctx.shadowBlur = 8; ctx.shadowColor = this.color;
                ctx.strokeStyle = this.color; ctx.fillStyle = "rgba(10,10,30,0.8)"; ctx.lineWidth = 3;
                
                if (this.activeSkill === "SUPER_VELOCIDAD") {
                    ctx.strokeStyle = "#ff9f43";
                } else if (this.activeSkill === "DISPARO_TRIPLE") {
                    ctx.strokeStyle = "#ffdd59";
                }

                ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(-14, -11); ctx.lineTo(-7, 0); ctx.lineTo(-14, 12); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.restore();
                
                // Texto escalable (evitamos que se rompa con zooms muy bajos)
                ctx.fillStyle = "#fff"; ctx.font = "11px monospace"; ctx.textAlign = "center";
                let infoString = this.name.toUpperCase();
                if (this.activeSkill !== "NINGUNA") infoString += ` [${this.activeSkill.replace('_',' ')}]`;
                ctx.fillText(infoString, sx, sy - 22);
            }
        }

        class Bullet {
            constructor(id, ownerId, x, y, angle, color = '#fff200') {
                this.id = id; this.ownerId = ownerId; this.x = x; this.y = y;
                this.vx = Math.cos(angle) * 18; this.vy = Math.sin(angle) * 18;
                this.color = color; this.life = 120;
            }
            update(dt) { this.x += this.vx * (dt*60); this.y += this.vy * (dt*60); this.life -= (dt*60); }
        }

        // ==========================================
        // INFRAESTRUCTURA DE RED CON FIREBASE Y PEERJS
        // ==========================================
        class NetworkManager {
            constructor() { this.peer = null; this.connections = {}; this.isHost = false; this.roomCode = ""; }
            
            initHost(onReady) {
                this.isHost = true;
                this.peer = new Peer(null, { debug: 1 });
                
                this.peer.on('open', (id) => { 
                    this.roomCode = id; 
                    if (isPublicRoom) {
                        let hostName = document.getElementById('username').value || "ANÓNIMO";
                        firebaseRoomRef = ref(db, 'public_rooms/' + id);
                        set(firebaseRoomRef, { id: id, hostName: hostName.toUpperCase(), createdAt: Date.now() });
                        onDisconnect(firebaseRoomRef).remove();
                    }
                    onReady(id); 
                });
                this.peer.on('connection', (c) => {
                    c.on('open', () => { this.connections[c.peer] = c; this.bindEvents(c); });
                });
            }

            initClient(code, onReady) {
                this.isHost = false; this.roomCode = code;
                this.peer = new Peer(null, { debug: 1 });
                this.peer.on('open', () => {
                    let c = this.peer.connect(code, { reliable: true });
                    c.on('open', () => { this.connections[code] = c; this.bindEvents(c); onReady(); });
                    c.on('error', (err) => { alert("Error al enlazar con el host."); location.reload(); });
                });
            }

            bindEvents(c) {
                c.on('data', (data) => this.onDataReceived(data, c.peer));
                c.on('close', () => { delete game.players[c.peer]; delete this.connections[c.peer]; });
            }

            broadcast(msg) { Object.values(this.connections).forEach(c => c.send(msg)); }
            sendToHost(msg) { Object.values(this.connections)[0]?.send(msg); }

            onDataReceived(data, sender) {
                if (this.isHost) {
                    if (data.type === 'join_presentation') {
                        game.players[sender] = new Player(sender, data.name, Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, data.color, false);
                        this.forceSnapshot();
                    }
                    if (data.type === 'sync') {
                        let p = game.players[sender];
                        if (p) {
                            p.buffer.push({ t: Date.now(), x: data.x, y: data.y, angle: data.angle });
                            p.activeSkill = data.activeSkill;
                        }
                    }
                    if (data.type === 'fire') { game.spawnBulletsFromEvent(sender, data.x, data.y, data.angle); }
                    if (data.type === 'skill_acquired') {
                        let p = game.players[sender];
                        if(p) {
                            p.activeSkill = data.skill; game.skills = game.skills.filter(s => s.id !== data.skillId);
                            this.forceSnapshot();
                        }
                    }
                } else {
                    if (data.type === 'snapshot') {
                        data.players.forEach(pData => {
                            if (pData.id === game.localId) { game.localPlayer.score = pData.score; return; }
                            let p = game.players[pData.id];
                            if (!p) game.players[pData.id] = new Player(pData.id, pData.name, pData.x, pData.y, pData.color, false);
                            else { p.buffer.push({ t: Date.now(), x: pData.x, y: pData.y, angle: pData.angle }); p.score = pData.score; p.activeSkill = pData.activeSkill; }
                        });
                        Object.keys(game.players).forEach(id => {
                            if(id !== game.localId && !data.players.some(p => p.id === id)) delete game.players[id];
                        });
                        game.bullets = data.bullets.map(b => Object.assign(new Bullet(), b));
                        game.gems = data.gems; game.skills = data.skills;
                    }
                    if (data.type === 'fxExplosion') { game.shakeIntensity = 12; FX.spawn(data.x, data.y, '#ff4757', 3, 25); }
                    if (data.type === 'grant_skill' && data.targetId === game.localId) {
                        game.localPlayer.activeSkill = data.skill; game.localPlayer.skillTimeLeft = 5;
                    }
                }
            }

            forceSnapshot() {
                this.broadcast({
                    type: 'snapshot',
                    players: Object.values(game.players).map(p => ({ id: p.id, name: p.name, x: p.x, y: p.y, angle: p.angle, score: p.score, color: p.color, activeSkill: p.activeSkill })),
                    bullets: game.bullets, gems: game.gems, skills: game.skills
                });
            }
        }
        const net = new NetworkManager();

        // ==========================================
        // NÚCLEO MECÁNICO DEL JUEGO
        // ==========================================
        class CoreEngine {
            constructor() {
                this.localId = ""; this.localPlayer = null; this.players = {}; this.bullets = []; this.gems = []; this.skills = [];
                this.keys = {}; this.mouseAngle = 0; this.lastTime = performance.now(); this.netTimer = 0; this.shakeIntensity = 0;
            }

            start(name, color) {
                this.localId = 'usr_' + Math.random().toString(36).substring(2,7);
                this.localPlayer = new Player(this.localId, name, Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, color, true);
                this.players[this.localId] = this.localPlayer;

                window.addEventListener('keydown', (e) => this.keys[e.key] = true);
                window.addEventListener('keyup', (e) => this.keys[e.key] = false);
                
                window.addEventListener('mousemove', (e) => {
                    if (controlMode !== "pc") return;
                    // Adaptamos el cálculo del ángulo del ratón al Zoom actual de la cámara
                    let dx = (e.clientX - canvas.width / 2) / camera.zoom;
                    let dy = (e.clientY - canvas.height / 2) / camera.zoom;
                    this.mouseAngle = Math.atan2(dy, dx);
                });
                
                window.addEventListener('click', (e) => {
                    if (document.getElementById('lobbyUI').style.display !== 'none') return;
                    if (e.target.closest('#fullscreenBtn')) return; // Evitar disparar al tocar el botón full screen
                    if (controlMode === "mobile") return; 
                    this.fireWeapon();
                });

                // Soporte para Zoom con Rueda del Ratón (PC)
                window.addEventListener('wheel', (e) => {
                    if (document.getElementById('lobbyUI').style.display !== 'none') return;
                    if (e.deltaY < 0) camera.targetZoom += 0.08;
                    else camera.targetZoom -= 0.08;
                    camera.targetZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.targetZoom));
                }, { passive: true });

                this.setupTouchControls();

                window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; generateStars(); });
                canvas.width = window.innerWidth; canvas.height = window.innerHeight; generateStars();

                if (net.isHost) {
                    for(let i=0; i<50; i++) this.gems.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE });
                    for(let i=0; i<6; i++) this.spawnRandomSkillOnMap();
                } else {
                    net.sendToHost({ type: 'join_presentation', name: this.localPlayer.name, color: this.localPlayer.color });
                }

                document.getElementById('lobbyUI').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('skillhud').style.display = 'block';
                document.getElementById('leaderboard').style.display = 'block';
                document.getElementById('roomPanel').style.display = 'block';
                document.getElementById('roomString').innerText = `ID: ${net.roomCode}`;

                requestAnimationFrame((t) => this.loop(t));
            }

            fireWeapon() {
                if(net.isHost) {
                    this.spawnBulletsFromEvent(this.localId, this.localPlayer.x, this.localPlayer.y, this.localPlayer.angle);
                } else {
                    net.sendToHost({ type: 'fire', x: this.localPlayer.x, y: this.localPlayer.y, angle: this.localPlayer.angle });
                }
            }

            spawnBulletsFromEvent(ownerId, x, y, angle) {
                let shooter = this.players[ownerId];
                let bulletColor = '#fff200';
                let currentSkill = shooter ? shooter.activeSkill : "NINGUNA";

                if (currentSkill === "DISPARO_TRIPLE") {
                    bulletColor = '#ffdd59';
                    this.bullets.push(new Bullet(Math.random().toString(), ownerId, x, y, angle, bulletColor));
                    this.bullets.push(new Bullet(Math.random().toString(), ownerId, x, y, angle - 0.2, bulletColor));
                    this.bullets.push(new Bullet(Math.random().toString(), ownerId, x, y, angle + 0.2, bulletColor));
                } else {
                    this.bullets.push(new Bullet(Math.random().toString(), ownerId, x, y, angle, bulletColor));
                }
            }

            spawnRandomSkillOnMap() {
                const types = ["SUPER_VELOCIDAD", "DISPARO_TRIPLE"];
                let chosenType = types[Math.floor(Math.random() * types.length)];
                this.skills.push({
                    id: 'sk_' + Math.random().toString(36).substring(2,7),
                    x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, type: chosenType
                });
            }

            // GESTIÓN TÁCTIL: JOYSTICK, DISPARO Y PINCH-TO-ZOOM (GESTOR DE DEDOS)
            setupTouchControls() {
                canvas.addEventListener('touchstart', (e) => {
                    if (controlMode !== "mobile") return;

                    // Si hay 2 dedos en la pantalla, inicializamos el gesto de Pinch (Acelerar/Alejar zoom)
                    if (e.targetTouches.length === 2) {
                        camera.isPinching = true;
                        let dx = e.targetTouches[0].clientX - e.targetTouches[1].clientX;
                        let dy = e.targetTouches[0].clientY - e.targetTouches[1].clientY;
                        camera.initialPinchDist = Math.sqrt(dx*dx + dy*dy);
                        return; 
                    }

                    for (let touch of e.changedTouches) {
                        // El lado izquierdo maneja el movimiento (Joystick)
                        if (!joystick.active && touch.clientX < window.innerWidth / 2) {
                            joystick.active = true;
                            joystick.pointerId = touch.identifier;
                            joystick.startX = touch.clientX; joystick.startY = touch.clientY;
                            joystick.currentX = touch.clientX; joystick.currentY = touch.clientY;
                            joystick.moveX = 0; joystick.moveY = 0;
                        } else if (touch.clientX >= window.innerWidth / 2 && !camera.isPinching) {
                            // El lado derecho procesa disparos (Siempre que no estemos haciendo Zoom)
                            this.fireWeapon();
                        }
                    }
                }, { passive: true });

                canvas.addEventListener('touchmove', (e) => {
                    if (controlMode !== "mobile") return;

                    // Procesamiento del gesto Pinch con dos dedos
                    if (e.targetTouches.length === 2 && camera.isPinching) {
                        let dx = e.targetTouches[0].clientX - e.targetTouches[1].clientX;
                        let dy = e.targetTouches[0].clientY - e.targetTouches[1].clientY;
                        let currentDist = Math.sqrt(dx*dx + dy*dy);
                        
                        // Factor de escala basado en la separación de los dedos
                        let factor = currentDist / camera.initialPinchDist;
                        camera.targetZoom = camera.zoom * factor;
                        camera.targetZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.targetZoom));
                        
                        // Reseteamos el punto inicial para transiciones suaves
                        camera.initialPinchDist = currentDist;
                        return;
                    }

                    // Procesamiento del movimiento del Joystick
                    if (joystick.active) {
                        for (let touch of e.changedTouches) {
                            if (touch.identifier === joystick.pointerId) {
                                joystick.currentX = touch.clientX; joystick.currentY = touch.clientY;

                                let dx = joystick.currentX - joystick.startX;
                                let dy = joystick.currentY - joystick.startY;
                                let dist = Math.sqrt(dx*dx + dy*dy);

                                if (dist > joystick.maxRadius) {
                                    dx = (dx / dist) * joystick.maxRadius;
                                    dy = (dy / dist) * joystick.maxRadius;
                                }
                                joystick.moveX = dx / joystick.maxRadius;
                                joystick.moveY = dy / joystick.maxRadius;
                            }
                        }
                    }
                }, { passive: true });

                const endTouch = (e) => {
                    if (e.targetTouches.length < 2) {
                        camera.isPinching = false;
                    }
                    if (!joystick.active) return;
                    for (let touch of e.changedTouches) {
                        if (touch.identifier === joystick.pointerId) {
                            joystick.active = false; joystick.pointerId = null;
                            joystick.moveX = 0; joystick.moveY = 0;
                        }
                    }
                };

                canvas.addEventListener('touchend', endTouch, { passive: true });
                canvas.addEventListener('touchcancel', endTouch, { passive: true });
            }

            loop(now) {
                let dt = (now - this.lastTime) / 1000; this.lastTime = now;
                if(dt > 0.1) dt = 0.1;
                this.update(dt);
                this.render();
                requestAnimationFrame((t) => this.loop(t));
            }

            update(dt) {
                // Suavizado e interpolación de la cámara (Zoom fluido)
                camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;

                Object.values(this.players).forEach(p => p.update(dt, this.keys, this.mouseAngle));
                FX.update(dt);
                if (this.shakeIntensity > 0) this.shakeIntensity *= 0.9;

                document.getElementById('skillVal').innerText = this.localPlayer.activeSkill.replace('_',' ');
                document.getElementById('skillTime').innerText = Math.ceil(this.localPlayer.skillTimeLeft);

                if (net.isHost) {
                    for (let i = this.bullets.length - 1; i >= 0; i--) {
                        let b = this.bullets[i]; b.update(dt);
                        let hit = false;

                        Object.values(this.players).forEach(p => {
                            if (b.ownerId !== p.id && !hit) {
                                let dx = b.x - p.x, dy = b.y - p.y;
                                if (Math.sqrt(dx*dx + dy*dy) < p.radius + 3) {
                                    p.score = Math.max(0, p.score - 5);
                                    if(this.players[b.ownerId]) this.players[b.ownerId].score += 10;
                                    p.x = Math.random()*WORLD_SIZE; p.y = Math.random()*WORLD_SIZE; p.vx = 0; p.vy = 0;
                                    
                                    p.activeSkill = "NINGUNA"; 
                                    if (p.id === this.localId) this.localPlayer.skillTimeLeft = 0;
                                    else net.broadcast({ type: 'grant_skill', targetId: p.id, skill: "NINGUNA" });

                                    this.shakeIntensity = 12;
                                    FX.spawn(p.x, p.y, '#ff4757', 4, 25);
                                    net.broadcast({ type: 'fxExplosion', x: p.x, y: p.y });
                                    hit = true;
                                }
                            }
                        });
                        if (hit || b.life <= 0) this.bullets.splice(i, 1);
                    }

                    for (let i = this.gems.length - 1; i >= 0; i--) {
                        let g = this.gems[i];
                        Object.values(this.players).forEach(p => {
                            let dx = p.x - g.x, dy = p.y - g.y;
                            if (Math.sqrt(dx*dx + dy*dy) < p.radius + 8) {
                                p.score += 1; this.gems.splice(i, 1);
                                this.gems.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE });
                            }
                        });
                    }

                    for (let i = this.skills.length - 1; i >= 0; i--) {
                        let sk = this.skills[i];
                        Object.values(this.players).forEach(p => {
                            let dx = p.x - sk.x, dy = p.y - sk.y;
                            if (Math.sqrt(dx*dx + dy*dy) < p.radius + 12) {
                                if (p.id === this.localId) {
                                    this.localPlayer.activeSkill = sk.type; this.localPlayer.skillTimeLeft = 5;
                                } else {
                                    net.broadcast({ type: 'grant_skill', targetId: p.id, skill: sk.type });
                                }
                                FX.spawn(sk.x, sk.y, '#ffdd59', 3, 15); this.skills.splice(i, 1);
                                setTimeout(() => { if(net.isHost) this.spawnRandomSkillOnMap(); }, 4000);
                            }
                        });
                    }

                    this.netTimer += dt * 1000;
                    if (this.netTimer >= 45) { net.forceSnapshot(); this.netTimer = 0; }
                } else {
                    this.netTimer += dt * 1000;
                    if (this.netTimer >= 45) {
                        net.sendToHost({ type: 'sync', x: this.localPlayer.x, y: this.localPlayer.y, angle: this.localPlayer.angle, activeSkill: this.localPlayer.activeSkill });
                        this.netTimer = 0;
                    }

                    this.skills.forEach(sk => {
                        let dx = this.localPlayer.x - sk.x, dy = this.localPlayer.y - sk.y;
                        if (Math.sqrt(dx*dx + dy*dy) < this.localPlayer.radius + 12) {
                            if (this.localPlayer.activeSkill === "NINGUNA") { 
                                net.sendToHost({ type: 'skill_acquired', skillId: sk.id, skill: sk.type });
                            }
                        }
                    });
                }
                
                document.getElementById('scoreVal').innerText = this.localPlayer.score;
                this.drawLeaderboard();
            }

            drawLeaderboard() {
                let sorted = Object.values(this.players).sort((a,b) => b.score - a.score);
                document.getElementById('lbContent').innerHTML = sorted.slice(0, 5).map((p, i) => `
                    <div class="lb-row" style="color: ${p.color}"><span>${i+1}. ${p.name}</span><span>${p.score}P</span></div>
                `).join('');
            }

            render() {
                ctx.fillStyle = '#03030c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Centro de la Cámara centrado en el jugador local
                let cx = this.localPlayer.x;
                let cy = this.localPlayer.y;

                ctx.save();
                
                // Efecto de sacudida (Screen Shake)
                if (this.shakeIntensity > 0.2) ctx.translate((Math.random()-0.5)*this.shakeIntensity, (Math.random()-0.5)*this.shakeIntensity);

                // --- MATRIZ DE TRANSFORMACIÓN DE LA CÁMARA (ZOOM DINÁMICO) ---
                // Movemos el origen al centro del Canvas, escalamos el mundo y re-centramos en la nave
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(camera.zoom, camera.zoom);
                ctx.translate(-cx, -cy);

                // Estrellas de fondo (corregimos el renderizado al espacio de la cámara)
                ctx.fillStyle = '#fff';
                starsBackground.forEach((s, idx) => {
                    // Distribución ficticia usando el índice para fijar posiciones relativas al espacio local
                    let sx = (idx * 37 + cx * (1 - s.depth)) % WORLD_SIZE;
                    let sy = (idx * 59 + cy * (1 - s.depth)) % WORLD_SIZE;
                    if (sx < 0) sx += WORLD_SIZE; if (sy < 0) sy += WORLD_SIZE;
                    ctx.fillRect(sx, sy, s.size, s.size);
                });

                // Límites del Mundo
                ctx.strokeStyle = '#5758bb'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

                // Dibujar Gemas
                this.gems.forEach(g => {
                    ctx.fillStyle = '#00d2d3'; ctx.fillRect(g.x - 4, g.y - 4, 8, 8);
                });

                // Dibujar Contenedores de Habilidades
                this.skills.forEach(sk => {
                    ctx.save();
                    ctx.fillStyle = sk.type === "SUPER_VELOCIDAD" ? "#ff9f43" : "#ffdd59";
                    ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                    ctx.beginPath();
                    ctx.moveTo(sk.x, sk.y - 12); ctx.lineTo(sk.x + 12, sk.y); ctx.lineTo(sk.x, sk.y + 12); ctx.lineTo(sk.x - 12, sk.y);
                    ctx.closePath(); ctx.fill();
                    ctx.restore();
                });

                // Balas
                this.bullets.forEach(b => {
                    ctx.fillStyle = b.color; ctx.fillRect(b.x - 2, b.y - 2, 5, 5);
                });

                // Jugadores y efectos
                Object.values(this.players).forEach(p => p.draw(ctx, 0, 0));
                FX.draw(ctx, 0, 0);
                
                ctx.restore(); // Restauramos para pintar la interfaz HUD de forma estática arriba del juego

                // DIBUJAR INTERFAZ DE JOYSTICK (Estática, no le afecta el zoom)
                if (controlMode === "mobile" && joystick.active) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = "rgba(0, 210, 211, 0.4)"; ctx.lineWidth = 4; ctx.stroke();
                    ctx.fillStyle = "rgba(8, 8, 24, 0.2)"; ctx.fill();

                    ctx.beginPath();
                    let stickX = joystick.startX + joystick.moveX * joystick.maxRadius;
                    let stickY = joystick.startY + joystick.moveY * joystick.maxRadius;
                    ctx.arc(stickX, stickY, 25, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(0, 210, 211, 0.8)"; ctx.shadowBlur = 10; ctx.shadowColor = "#00d2d3"; ctx.fill();
                    ctx.restore();
                }
            }
        }

        const game = new CoreEngine();

        // Escucha en tiempo real de Firebase
        const serverListContainer = document.getElementById('serverListContainer');
        const publicRoomsRef = ref(db, 'public_rooms');

        onValue(publicRoomsRef, (snapshot) => {
            if (document.getElementById('joinTab').classList.contains('active')) {
                const data = snapshot.val();
                if (!data) {
                    serverListContainer.innerHTML = '<div class="no-servers">No hay salas públicas. ¡Crea una!</div>';
                    return;
                }
                serverListContainer.innerHTML = Object.values(data).map(room => `
                    <div class="server-item">
                        <span>🚀 SERVIDOR DE: <b>${room.hostName}</b></span>
                        <button class="join-item-btn" data-id="${room.id}">UNIRSE</button>
                    </div>
                `).join('');
                document.querySelectorAll('.join-item-btn').forEach(btn => {
                    btn.addEventListener('click', () => { directConnect(btn.getAttribute('data-id')); });
                });
            }
        });

        function directConnect(id) {
            document.getElementById('statusMsg').innerText = "Estableciendo puente WebRTC...";
            net.initClient(id, () => { game.start(document.getElementById('username').value, activeColor); });
        }

        // ==========================================
        // GESTIÓN INTERFAZ LOBBY Y PANTALLA COMPLETA
        // ==========================================
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error al activar Fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.getElementById('controlPC').addEventListener('click', () => {
            controlMode = "pc";
            document.getElementById('controlPC').classList.add('selected');
            document.getElementById('controlMobile').classList.remove('selected');
        });

        document.getElementById('controlMobile').addEventListener('click', () => {
            controlMode = "mobile";
            document.getElementById('controlMobile').classList.add('selected');
            document.getElementById('controlPC').classList.remove('selected');
        });

        document.getElementById('tabBtnHost').addEventListener('click', () => {
            document.getElementById('joinTab').classList.remove('active'); document.getElementById('tabBtnJoin').classList.remove('active');
            document.getElementById('hostTab').classList.add('active'); document.getElementById('tabBtnHost').classList.add('active');
        });

        document.getElementById('tabBtnJoin').addEventListener('click', () => {
            document.getElementById('hostTab').classList.remove('active'); document.getElementById('tabBtnHost').classList.remove('active');
            document.getElementById('joinTab').classList.add('active'); document.getElementById('tabBtnJoin').classList.add('active');
        });

        document.getElementById('typePublic').addEventListener('click', () => {
            isPublicRoom = true;
            document.getElementById('typePublic').classList.add('selected'); document.getElementById('typePrivate').classList.remove('selected');
        });

        document.getElementById('typePrivate').addEventListener('click', () => {
            isPublicRoom = false;
            document.getElementById('typePrivate').classList.add('selected'); document.getElementById('typePublic').classList.remove('selected');
        });

        document.querySelectorAll('.color-opt').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected'); activeColor = opt.getAttribute('data-color');
            });
        });

        document.getElementById('btnHost').addEventListener('click', () => {
            document.getElementById('statusMsg').innerText = "Abriendo hangar seguro...";
            net.initHost((id) => { game.start(document.getElementById('username').value, activeColor); });
        });

        document.getElementById('btnJoin').addEventListener('click', () => {
            let target = document.getElementById('joinId').value.trim();
            if(!target) return alert("Escribe el código de sala.");
            directConnect(target);
        });

        document.getElementById('btnCopy').addEventListener('click', () => {
            navigator.clipboard.writeText(net.roomCode);
            let btn = document.getElementById('btnCopy'); btn.innerText = "¡COPIADO!";
            setTimeout(() => btn.innerText = "COPIAR ID", 1500);
        });
    </script>
</body>
</html>
