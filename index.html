<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag crucial para que los controles táctiles funcionen bien en celulares sin hacer zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego con Controles Móviles y Habilidades</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Evita que se seleccione texto al presionar botones */
            -webkit-user-select: none;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 450px;
            max-width: 100vw;
            max-height: 100vh;
        }
        canvas {
            background: #222;
            display: block;
            border: 2px solid #444;
            width: 100%;
            height: 100%;
        }
        /* --- ESTILOS DE CONTROLES PARA CELULARES --- */
        #mobile-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Deja pasar los clicks al canvas si es necesario */
        }
        .touch-zone {
            position: absolute;
            pointer-events: auto; /* Activa los clicks solo en las zonas de botones */
        }
        #d-pad {
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }
        #action-pad {
            bottom: 20px;
            right: 20px;
        }
        .btn-touch {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.6);
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .btn-touch:active {
            background: rgba(255, 255, 255, 0.6);
        }
        /* Posiciones específicas en la rejilla del D-Pad */
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
        
        #btn-jump {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(0, 150, 255, 0.4);
            border-color: rgba(0, 150, 255, 0.8);
        }
        #btn-jump:active {
            background: rgba(0, 150, 255, 0.8);
        }
        #ui-info {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <div id="ui-info">Habilidad: Ninguna</div>
        
        <!-- Controles virtuales para móviles -->
        <div id="mobile-controls" style="display: none;">
            <div id="d-pad" class="touch-zone">
                <button id="btn-up" class="btn-touch">↑</button>
                <button id="btn-left" class="btn-touch">←</button>
                <button id="btn-right" class="btn-touch">→</button>
                <button id="btn-down" class="btn-touch">↓</button>
            </div>
            <div id="action-pad" class="touch-zone">
                <button id="btn-jump" class="btn-touch">SALT</button>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const uiInfo = document.getElementById('ui-info');

// --- DETECCIÓN MÓVIL ---
// Forzamos visibilidad si es táctil o si el userAgent coincide
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
if (isMobile) {
    document.getElementById('mobile-controls').style.display = 'block';
}

// --- ESTADO DE ENTRADAS UNIFICADO ---
const inputState = { left: false, right: false, up: false, down: false, jump: false };

// Eventos de Teclado (PC)
const keyMap = {
    'ArrowLeft': 'left', 'a': 'left', 'A': 'left',
    'ArrowRight': 'right', 'd': 'right', 'D': 'right',
    'ArrowUp': 'up', 'w': 'w', 'W': 'up',
    'ArrowDown': 'down', 's': 's', 'S': 'down',
    ' ': 'jump' // Espacio para saltar
};

window.addEventListener('keydown', (e) => {
    if (keyMap[e.key]) inputState[keyMap[e.key]] = true;
});
window.addEventListener('keyup', (e) => {
    if (keyMap[e.key]) inputState[keyMap[e.key]] = false;
});

// Eventos Táctiles (Móvil)
function bindTouchAction(buttonId, actionField) {
    const btn = document.getElementById(buttonId);
    
    // Evitamos el comportamiento por defecto (scroll, zoom, doble tap simulado)
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        inputState[actionField] = true;
    }, { passive: false });

    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        inputState[actionField] = false;
    }, { passive: false });
}

bindTouchAction('btn-left', 'left');
bindTouchAction('btn-right', 'right');
bindTouchAction('btn-up', 'up');
bindTouchAction('btn-down', 'down');
bindTouchAction('btn-jump', 'jump');


// --- ENTIDADES DEL JUEGO ---
const player = {
    x: 100,
    y: 300,
    width: 30,
    height: 40,
    baseSpeed: 4,
    speed: 4,
    baseJumpForce: 12,
    jumpForce: 12,
    vx: 0,
    vy: 0,
    baseGravity: 0.6,
    gravity: 0.6,
    grounded: false,
    color: '#00FF66'
};

// Escenario básico (Plataformas fijas para probar)
const platforms = [
    { x: 0, y: 420, width: 800, height: 30 },   // Suelo
    { x: 150, y: 300, width: 150, height: 15 }, // Plataforma 1
    { x: 450, y: 220, width: 200, height: 15 }  // Plataforma 2
];


// --- SISTEMA DE HABILIDADES ALEATORIAS ---
let activePowerUp = null;
let powerUpTimer = 0;
const powerUpDuration = 5000; // 5 segundos

const powerUpTypes = [
    {
        name: 'Súper Velocidad',
        color: '#FFD700', // Dorado
        apply: (p) => { p.speed = p.baseSpeed * 2; p.color = '#FFD700'; },
        remove: (p) => { p.speed = p.baseSpeed; p.color = '#00FF66'; }
    },
    {
        name: 'Súper Salto (Baja Gravedad)',
        color: '#00FFFF', // Cian
        apply: (p) => { p.gravity = p.baseGravity * 0.4; p.jumpForce = p.baseJumpForce * 1.3; p.color = '#00FFFF'; },
        remove: (p) => { p.gravity = p.baseGravity; p.jumpForce = p.baseJumpForce; p.color = '#00FF66'; }
    },
    {
        name: 'Mini Jugador (Evasivo)',
        color: '#FF00FF', // Magenta
        apply: (p) => { p.width = 15; p.height = 20; p.color = '#FF00FF'; },
        remove: (p) => { p.width = 30; p.height = 40; p.color = '#00FF66'; }
    }
];

let itemOnMap = null;

function spawnPowerUp() {
    // Escoge una plataforma aleatoria para colocar el item encima
    const targetPlatform = platforms[Math.floor(Math.random() * platforms.length)];
    
    itemOnMap = {
        x: targetPlatform.x + Math.random() * (targetPlatform.width - 20) + 10,
        y: targetPlatform.y - 25, // Un poco elevado sobre la plataforma
        size: 16,
        pulse: 0,
        type: powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)]
    };
}

// Spawn inicial
spawnPowerUp();


// --- MOTOR DE FÍSICA Y COLISIONES ---
function checkAABBCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function update(deltaTime) {
    // 1. Movimiento Horizontal
    player.vx = 0;
    if (inputState.left) player.vx = -player.speed;
    if (inputState.right) player.vx = player.speed;

    player.x += player.vx;

    // Límites laterales de la pantalla
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    // 2. Movimiento Vertical (Gravedad y Salto)
    player.vy += player.gravity;
    
    if (inputState.jump && player.grounded) {
        player.vy = -player.jumpForce;
        player.grounded = false;
    }

    player.y += player.vy;
    player.grounded = false;

    // 3. Colisión con plataformas
    for (let plat of platforms) {
        // Verificar si el jugador cae sobre la plataforma
        if (player.x + player.width > plat.x &&
            player.x < plat.x + plat.width &&
            player.y + player.height >= plat.y &&
            player.y + player.height - player.vy <= plat.y + 10) {
            
            player.y = plat.y - player.height;
            player.vy = 0;
            player.grounded = true;
        }
    }

    // 4. Colisión con el item de habilidad
    if (itemOnMap) {
        itemOnMap.pulse += 0.1; // Efecto visual de animación
        
        const itemRect = { x: itemOnMap.x, y: itemOnMap.y, width: itemOnMap.size, height: itemOnMap.size };
        if (checkAABBCollision(player, itemRect)) {
            // Cancelar habilidad previa si existía
            if (activePowerUp) activePowerUp.remove(player);

            // Aplicar nueva habilidad
            activePowerUp = itemOnMap.type;
            activePowerUp.apply(player);
            powerUpTimer = powerUpDuration;
            
            itemOnMap = null; // Quitar del mapa
        }
    }

    // 5. Gestionar temporizador de la habilidad activa
    if (activePowerUp) {
        powerUpTimer -= deltaTime;
        uiInfo.innerText = `Habilidad: ${activePowerUp.name} (${(powerUpTimer / 1000).toFixed(1)}s)`;
        uiInfo.style.color = activePowerUp.color;

        if (powerUpTimer <= 0) {
            activePowerUp.remove(player);
            activePowerUp = null;
            uiInfo.innerText = "Habilidad: Ninguna";
            uiInfo.style.color = "#fff";
            
            // Reaparecer otra habilidad en el mapa tras 2 segundos de tregua
            setTimeout(spawnPowerUp, 2000);
        }
    }
}

// --- RENDERIZADO (DIBUJO) ---
function draw() {
    // Limpiar pantalla
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar plataformas
    ctx.fillStyle = '#444';
    for (let plat of platforms) {
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    // Dibujar Item de habilidad (si existe en el mapa)
    if (itemOnMap) {
        ctx.fillStyle = itemOnMap.type.color;
        // Efecto latido usando Math.sin
        const sizeOffset = Math.sin(itemOnMap.pulse) * 3;
        ctx.fillRect(
            itemOnMap.x - sizeOffset/2, 
            itemOnMap.y - sizeOffset/2, 
            itemOnMap.size + sizeOffset, 
            itemOnMap.size + sizeOffset
        );
        
        // Brillo exterior simple
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(itemOnMap.x - sizeOffset/2, itemOnMap.y - sizeOffset/2, itemOnMap.size + sizeOffset, itemOnMap.size + sizeOffset);
    }

    // Dibujar Jugador
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

// --- BUCLE PRINCIPAL DEL JUEGO (Game Loop) ---
let lastTime = 0;

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    update(deltaTime);
    draw();

    requestAnimationFrame(gameLoop);
}

// Iniciar juego
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
